name: Bootstrap source

on:
  push:
    branches: [main]
    paths:
      - 'bootstrap/**'
      - '.github/workflows/bootstrap-source.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Expand public source archive
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/part-* > /tmp/tre-output-airlock-source.tar.gz
          tar -xzf /tmp/tre-output-airlock-source.tar.gz -C .
          rm -rf bootstrap .github/workflows/bootstrap-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Publish TRE output airlock v0.3.0 source"
          git push origin HEAD:main
