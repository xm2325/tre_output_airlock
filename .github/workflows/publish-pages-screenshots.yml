name: Publish Pages screenshots

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-pages-screenshots.yml"

permissions:
  actions: read
  contents: write

jobs:
  publish:
    if: github.repository == 'xm2325/tre_output_airlock'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download verified Pages screenshots
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs/screenshots
          gh run download 29367166199 \
            --repo xm2325/tre_output_airlock \
            --name pages-screenshots \
            --dir docs/screenshots
      - name: Add product screenshots to README
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")
          heading = "## Product screenshots"
          lines = [
              heading,
              "",
              "### Researcher operations dashboard",
              "",
              "![TRE Output Airlock operations dashboard](docs/screenshots/01-operations-dashboard.png)",
              "",
              "### Risk-prioritised reviewer queue",
              "",
              "![TRE Output Airlock reviewer queue](docs/screenshots/02-review-queue.png)",
              "",
              "### Claimed review with evidence and decision controls",
              "",
              "![TRE Output Airlock submission review detail](docs/screenshots/03-review-detail.png)",
              "",
          ]
          if heading not in text:
              anchor = "## Main capabilities"
              if anchor not in text:
                  raise SystemExit(f"README anchor not found: {anchor}")
              block = "\n".join(lines) + "\n"
              path.write_text(text.replace(anchor, block + anchor, 1), encoding="utf-8")
          PY
      - name: Commit screenshot documentation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md docs/screenshots/*.png
          git commit -m "Add live GitHub Pages screenshots"
          git push origin HEAD:main
