name: Export source snapshot

on:
  pull_request:
    paths:
      - ".github/workflows/export-source.yml"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create source archive
        run: |
          tar --exclude=.git -czf "$RUNNER_TEMP/tre-output-airlock-source.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: ${{ runner.temp }}/tre-output-airlock-source.tar.gz
