name: Diagnose v0.4 patch applicator

on:
  pull_request:
    paths:
      - ".github/workflows/export-source.yml"

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Query applicator runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p applicator-status
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/apply-v040.yml/runs?per_page=10" > applicator-status/runs.json
      - uses: actions/upload-artifact@v4
        with:
          name: v040-applicator-status
          path: applicator-status/runs.json
