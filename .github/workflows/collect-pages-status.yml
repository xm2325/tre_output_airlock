name: Query screenshot publisher

on:
  pull_request:
    paths:
      - ".github/workflows/collect-pages-status.yml"

permissions:
  actions: read
  contents: read

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - name: Query publisher runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p publisher-status
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/publish-pages-screenshots.yml/runs?per_page=10" \
            > publisher-status/runs.json
      - uses: actions/upload-artifact@v4
        with:
          name: screenshot-publisher-status
          path: publisher-status/runs.json
