name: Pages demo

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Build browser-only synthetic demo
        run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: "true"
          VITE_BASE_PATH: /tre_output_airlock/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  screenshots:
    name: Verify live demo and capture screenshots
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Playwright Chromium
        run: |
          mkdir -p "$RUNNER_TEMP/pages-capture"
          cd "$RUNNER_TEMP/pages-capture"
          npm init -y
          npm install playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Verify deployed dataset and capture workflow
        env:
          SITE_URL: ${{ needs.deploy.outputs.page_url }}
          NODE_PATH: ${{ runner.temp }}/pages-capture/node_modules
          EXPECTED_TOTAL_OUTPUTS: "18"
          EXPECTED_REVIEW_QUEUE: "6"
          DEPLOYED_SHA: ${{ github.sha }}
        run: |
          mkdir -p pages-screenshots
          node <<'NODE'
          const fs = require('node:fs')
          const { chromium } = require('playwright')
          const siteUrl = process.env.SITE_URL || 'https://xm2325.github.io/tre_output_airlock/'
          const expectedTotal = process.env.EXPECTED_TOTAL_OUTPUTS || '18'
          const expectedQueue = process.env.EXPECTED_REVIEW_QUEUE || '6'

          async function openWithRetry(page) {
            let lastError
            for (let attempt = 1; attempt <= 12; attempt += 1) {
              try {
                const separator = siteUrl.includes('?') ? '&' : '?'
                const response = await page.goto(
                  `${siteUrl}${separator}capture=${Date.now()}`,
                  { waitUntil: 'networkidle', timeout: 30_000 },
                )
                if (response && response.ok()) return
                lastError = new Error(`HTTP ${response ? response.status() : 'no response'}`)
              } catch (error) {
                lastError = error
              }
              await page.waitForTimeout(10_000)
            }
            throw lastError
          }

          ;(async () => {
            const browser = await chromium.launch({ headless: true })
            const context = await browser.newContext({
              viewport: { width: 1600, height: 1100 },
              deviceScaleFactor: 1,
            })
            const page = await context.newPage()
            await page.emulateMedia({ reducedMotion: 'reduce' })
            await openWithRetry(page)

            await page.getByText('Static portfolio demo', { exact: true }).waitFor({ timeout: 30_000 })
            await page.getByText(`${expectedTotal} synthetic outputs are preloaded in reviewer view.`, { exact: false }).waitFor({ timeout: 30_000 })

            const totalCard = page.locator('.metric-card').filter({ hasText: 'Total outputs' })
            await totalCard.locator('.metric-card__value').getByText(expectedTotal, { exact: true }).waitFor({ timeout: 30_000 })
            await page.getByText(`${expectedQueue} waiting`, { exact: true }).waitFor({ timeout: 30_000 })
            await page.locator('.queue-row').first().waitFor({ timeout: 30_000 })

            fs.writeFileSync('pages-screenshots/verification.json', JSON.stringify({
              verified_at: new Date().toISOString(),
              deployed_sha: process.env.DEPLOYED_SHA,
              site_url: siteUrl,
              observed_total_outputs: Number(expectedTotal),
              observed_review_queue: Number(expectedQueue),
              default_role: await page.getByLabel('Role').inputValue(),
              result: 'PASS',
            }, null, 2))

            await page.addStyleTag({
              content: '* { animation: none !important; transition: none !important; }',
            })
            await page.screenshot({
              path: 'pages-screenshots/01-operations-dashboard.png',
              fullPage: false,
            })

            const reviewGrid = page.locator('.dashboard-grid--secondary').first()
            await reviewGrid.scrollIntoViewIfNeeded()
            await reviewGrid.screenshot({
              path: 'pages-screenshots/02-review-queue.png',
            })

            await page.locator('.queue-row').first().click()
            const drawer = page.getByRole('dialog')
            await drawer.waitFor({ timeout: 20_000 })
            const claimButton = page.getByRole('button', { name: /Claim review/ })
            if (await claimButton.isVisible()) {
              await claimButton.click()
              await page.getByText(/Claimed by/).waitFor({ timeout: 10_000 })
            }
            const templateButton = page.getByRole('button', { name: 'Use mitigation example' })
            if (await templateButton.isEnabled()) await templateButton.click()
            await drawer.evaluate((element) => { element.scrollTop = 0 })
            await page.screenshot({
              path: 'pages-screenshots/03-review-detail.png',
              fullPage: false,
            })
            await browser.close()
          })().catch((error) => {
            console.error(error)
            process.exit(1)
          })
          NODE
      - name: Upload live verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: pages-live-verification
          path: |
            pages-screenshots/*.png
            pages-screenshots/verification.json
