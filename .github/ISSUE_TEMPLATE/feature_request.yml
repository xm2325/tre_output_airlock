name: Feature request
description: Propose a workflow, rule, interface or operational improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Security, policy or operational risks
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Suggested tests or acceptance criteria
