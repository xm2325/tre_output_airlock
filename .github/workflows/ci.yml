name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen --all-extras
      - name: Ruff
        id: ruff
        shell: bash
        run: |
          set +e
          uv run ruff check app tests alembic --output-format=json > "$RUNNER_TEMP/ruff.json"
          status=$?
          cat "$RUNNER_TEMP/ruff.json"
          exit "$status"
      - name: Upload Ruff diagnostics
        if: failure() && steps.ruff.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: ${{ runner.temp }}/ruff.json
      - run: uv run mypy app
      - run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=90
      - name: Smoke-test database migration
        run: |
          export AIRLOCK_DATABASE_URL="sqlite:///$RUNNER_TEMP/migration.db"
          uv run alembic upgrade head
          test "$(uv run alembic current | tr -d '[:space:]')" = "0001(head)"
      - name: Generate OpenAPI schema
        run: uv run python ../scripts/export_openapi.py --output "$RUNNER_TEMP/openapi.json"
      - name: Run synthetic policy benchmark
        run: >-
          PYTHONPATH=. uv run python -m app.evaluation
          --manifest ../benchmark/manifest.json
          --samples ../samples
          --output "$RUNNER_TEMP/benchmark-results.json"
          --require-all-expected
      - name: Audit Python dependencies
        id: python_audit
        shell: bash
        run: |
          set +e
          uv run pip-audit --format=json > "$RUNNER_TEMP/pip-audit.json" 2> "$RUNNER_TEMP/pip-audit.stderr"
          status=$?
          cat "$RUNNER_TEMP/pip-audit.stderr"
          cat "$RUNNER_TEMP/pip-audit.json"
          exit "$status"
      - name: Upload Python audit diagnostics
        if: failure() && steps.python_audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: python-audit-diagnostics
          path: |
            ${{ runner.temp }}/pip-audit.json
            ${{ runner.temp }}/pip-audit.stderr

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Build the browser-only Pages demo
        run: npm run build
        env:
          VITE_DEMO_MODE: "true"
          VITE_BASE_PATH: /tre_output_airlock/

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet

  integration:
    runs-on: ubuntu-latest
    needs: [backend, frontend, compose-config]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Start the full stack
        run: docker compose up -d --build
      - name: Wait for API readiness
        run: |
          for attempt in {1..45}; do
            if curl --fail --silent http://localhost:8000/ready > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color
          exit 1
      - name: Verify integrated routes
        run: |
          curl --fail --silent http://localhost:8000/health
          curl --fail --silent http://localhost:8000/api/v1/policy
          curl --fail --silent http://localhost:5173/
      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop the stack
        if: always()
        run: docker compose down -v

  container-build:
    runs-on: ubuntu-latest
    needs: [integration]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
