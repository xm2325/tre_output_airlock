name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check app tests alembic
      - run: python -m mypy app
      - run: python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=90
      - name: Smoke-test database migration
        run: |
          export AIRLOCK_DATABASE_URL="sqlite:///$RUNNER_TEMP/migration.db"
          alembic upgrade head
          test "$(alembic current | tr -d '[:space:]')" = "0001(head)"
      - name: Generate OpenAPI schema
        run: python ../scripts/export_openapi.py --output "$RUNNER_TEMP/openapi.json"
      - name: Run synthetic policy benchmark
        run: >-
          PYTHONPATH=. python -m app.evaluation
          --manifest ../benchmark/manifest.json
          --samples ../samples
          --output "$RUNNER_TEMP/benchmark-results.json"
          --require-all-expected
      - name: Audit Python dependencies
        run: python -m pip_audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet

  container-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
