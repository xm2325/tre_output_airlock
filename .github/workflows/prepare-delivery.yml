name: Prepare v0.3.1 delivery

on:
  push:
    branches: [agent/delivery-v031]
    paths:
      - ".delivery/**"
      - ".github/workflows/prepare-delivery.yml"
  pull_request:
    branches: [main]
    paths:
      - ".delivery/**"
      - ".github/workflows/prepare-delivery.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/delivery-v031

      - name: Extract delivery files
        run: |
          cat .delivery/part00 .delivery/part01 .delivery/part02 .delivery/part03 .delivery/part04 \
            | base64 --decode > "$RUNNER_TEMP/delivery.tar.gz"
          echo "2e1430af28d79a74a166fa8072834f169f909dd35caaac9c53422a8e063d5346  $RUNNER_TEMP/delivery.tar.gz" \
            | sha256sum --check
          tar -xzf "$RUNNER_TEMP/delivery.tar.gz" -C .

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lock and validate backend
        working-directory: backend
        run: |
          uv lock
          uv sync --frozen --all-extras
          uv run ruff check app tests alembic
          uv run mypy app
          uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=90
          uv run python ../scripts/export_openapi.py
          uv run python ../scripts/export_openapi.py --check

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Refresh and validate frontend
        working-directory: frontend
        run: |
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm run typecheck
          npm test
          npm run build
          VITE_DEMO_MODE=true VITE_BASE_PATH=/tre_output_airlock/ npm run build
          npm audit --audit-level=high

      - name: Commit release source
        run: |
          rm -rf .delivery
          rm -f .github/workflows/prepare-delivery.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Upgrade delivery workflow to v0.3.1"
          git push origin HEAD:agent/delivery-v031
