name: Collect Pages run status

on:
  pull_request:
    paths:
      - ".github/workflows/collect-pages-status.yml"

permissions:
  actions: read
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Query recent Pages runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p pages-status
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/pages.yml/runs?per_page=10" \
            > pages-status/pages-runs.json
      - uses: actions/upload-artifact@v4
        with:
          name: pages-run-status
          path: pages-status/pages-runs.json
