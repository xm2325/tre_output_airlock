name: Collect Pages screenshots

on:
  pull_request:
    paths:
      - ".github/workflows/collect-pages-status.yml"

permissions:
  actions: read
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/collect-pages-screenshots
      - name: Download live Pages screenshots
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs/screenshots
          gh run download 29367166199 \
            --repo "$GITHUB_REPOSITORY" \
            --name pages-screenshots \
            --dir docs/screenshots
      - name: Add screenshot section to README
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")
          heading = "## Product screenshots"
          if heading not in text:
              block = """## Product screenshots

### Researcher operations dashboard

![TRE Output Airlock operations dashboard](docs/screenshots/01-operations-dashboard.png)

### Risk-prioritised reviewer queue

![TRE Output Airlock reviewer queue](docs/screenshots/02-review-queue.png)

### Claimed review with evidence and decision controls

![TRE Output Airlock submission review detail](docs/screenshots/03-review-detail.png)

"""
              anchor = "## Main capabilities"
              if anchor not in text:
                  raise SystemExit(f"README anchor not found: {anchor}")
              path.write_text(text.replace(anchor, block + anchor, 1), encoding="utf-8")
          PY
      - name: Commit screenshots and README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/screenshots/*.png
          if git diff --cached --quiet; then
            echo "Screenshot documentation is unchanged."
            exit 0
          fi
          git commit -m "Add live GitHub Pages screenshots"
          git push origin HEAD:agent/collect-pages-screenshots
