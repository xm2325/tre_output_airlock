AWSTemplateFormatVersion: '2010-09-09'
Description: Synthetic TRE Output Airlock quarantine and scan-queue baseline.

Parameters:
  EnvironmentName:
    Type: String
    Default: demo

Resources:
  AirlockKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Encryption key for synthetic airlock quarantine objects.
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: RootAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: '*'

  AirlockKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub alias/tre-output-airlock-${EnvironmentName}
      TargetKeyId: !Ref AirlockKey

  ScanDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs
      MessageRetentionPeriod: 1209600
      QueueName: !Sub tre-output-airlock-${EnvironmentName}-dlq

  ScanQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs
      VisibilityTimeout: 300
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ScanDeadLetterQueue.Arn
        maxReceiveCount: 4
      QueueName: !Sub tre-output-airlock-${EnvironmentName}-scan

  ScanQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref ScanQueue]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowQuarantineBucketEvents
            Effect: Allow
            Principal: {Service: s3.amazonaws.com}
            Action: sqs:SendMessage
            Resource: !GetAtt ScanQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub arn:${AWS::Partition}:s3:::${AWS::StackName}-${AWS::AccountId}-${EnvironmentName}

  QuarantineBucket:
    Type: AWS::S3::Bucket
    DependsOn: ScanQueuePolicy
    Properties:
      BucketName: !Sub ${AWS::StackName}-${AWS::AccountId}-${EnvironmentName}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt AirlockKey.Arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration: {Status: Enabled}
      LifecycleConfiguration:
        Rules:
          - Id: RetireNonCurrentVersions
            Status: Enabled
            NoncurrentVersionExpiration: {NoncurrentDays: 30}
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt ScanQueue.Arn

  DeadLetterAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Airlock scan messages reached the dead-letter queue.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanDeadLetterQueue.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  QuarantineBucketName:
    Value: !Ref QuarantineBucket
  ScanQueueUrl:
    Value: !Ref ScanQueue
  ScanDeadLetterQueueUrl:
    Value: !Ref ScanDeadLetterQueue
