name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen --all-extras
      - run: uv run ruff check app tests alembic
      - run: uv run mypy app
      - run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=90
      - name: Smoke-test database migration
        run: |
          export AIRLOCK_DATABASE_URL="sqlite:///$RUNNER_TEMP/migration.db"
          uv run alembic upgrade head
          test "$(uv run alembic current | tr -d '[:space:]')" = "0001(head)"
      - name: Check OpenAPI snapshot
        run: uv run python ../scripts/export_openapi.py --check
      - name: Run synthetic policy benchmark
        run: >-
          PYTHONPATH=. uv run python -m app.evaluation
          --manifest ../benchmark/manifest.json
          --samples ../samples
          --output "$RUNNER_TEMP/benchmark-results.json"
          --require-all-expected
      - name: Audit Python dependencies
        run: uv run pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet

  integration:
    runs-on: ubuntu-latest
    needs: [backend, frontend, compose-config]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Start the full stack
        run: docker compose up -d --build
      - name: Wait for API readiness
        run: |
          for attempt in {1..45}; do
            if curl --fail --silent http://localhost:8000/ready > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color
          exit 1
      - name: Verify integrated routes
        run: |
          curl --fail --silent http://localhost:8000/health
          curl --fail --silent http://localhost:8000/api/v1/policy
          curl --fail --silent http://localhost:5173/
      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop the stack
        if: always()
        run: docker compose down -v

  container-build:
    runs-on: ubuntu-latest
    needs: [integration]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
