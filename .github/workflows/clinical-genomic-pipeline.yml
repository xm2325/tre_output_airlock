name: Clinical genomic pipeline

on:
  push:
    branches: [main]
    paths:
      - "clinical_genomic_pipeline/**"
      - "infra/aws/clinical_genomic/**"
      - "docs/clinical-genomic-platform.md"
      - "docs/adr/0005-clinical-genomic-data-contract.md"
      - "docs/adr/0006-contract-drift-and-operations.md"
      - "docs/adr/0007-jd-data-engineering-services.md"
      - ".github/workflows/clinical-genomic-pipeline.yml"
  pull_request:
    paths:
      - "clinical_genomic_pipeline/**"
      - "infra/aws/clinical_genomic/**"
      - "docs/clinical-genomic-platform.md"
      - "docs/adr/0005-clinical-genomic-data-contract.md"
      - "docs/adr/0006-contract-drift-and-operations.md"
      - "docs/adr/0007-jd-data-engineering-services.md"
      - ".github/workflows/clinical-genomic-pipeline.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: clinical-genomic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clinical_genomic_pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: clinical_genomic_pipeline/pyproject.toml
      - name: Install package and checks
        run: python -m pip install -e '.[dev,orchestration]'
      - name: Ruff
        run: ruff check src tests
      - name: MyPy
        run: mypy src
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Build receiver-side transfer receipt
        run: |
          clinical-genomic-transfer-receipt \
            --delivery-root samples \
            --file fhir_bundle.json \
            --file genomic_manifest.csv \
            --file genomics/sample_001.vcf \
            --output build/transfer-receipt.json \
            --tool GLOBUS \
            --transfer-id ci-globus-transfer-001 \
            --source-endpoint synthetic-nhs-source \
            --destination-endpoint synthetic-landing-zone \
            > build-transfer.json
      - name: Run valid synthetic delivery twice
        env:
          PIPELINE_PSEUDONYMISATION_SECRET: ci-only-secret-at-least-16-characters
        run: |
          clinical-genomic-pipeline \
            --fhir samples/fhir_bundle.json \
            --manifest samples/genomic_manifest.csv \
            --transfer-receipt build/transfer-receipt.json \
            --terminology-map reference/terminology_map.csv \
            --output build/ci > build-first.json
          clinical-genomic-pipeline \
            --fhir samples/fhir_bundle.json \
            --manifest samples/genomic_manifest.csv \
            --transfer-receipt build/transfer-receipt.json \
            --terminology-map reference/terminology_map.csv \
            --output build/ci > build-second.json
          python - <<'PY'
          import json
          from pathlib import Path

          first = json.loads(Path("build-first.json").read_text())
          second = json.loads(Path("build-second.json").read_text())
          assert first["reused_existing_run"] is False
          assert second["reused_existing_run"] is True
          assert first["run_id"] == second["run_id"]
          assert first["warning_count"] == 0
          PY
      - name: Run Prefect staged orchestration
        env:
          PREFECT_LOGGING_LEVEL: WARNING
        run: |
          python - <<'PY'
          from clinical_genomic_pipeline.flow import clinical_genomic_flow

          result = clinical_genomic_flow(
              "samples/fhir_bundle.json",
              "samples/genomic_manifest.csv",
              "build/transfer-receipt.json",
              "reference/terminology_map.csv",
              "build/ci",
              "ci-only-secret-at-least-16-characters",
          )
          assert result.reused_existing_run is True
          PY
      - name: Assert direct identifiers are absent from research zone
        run: |
          if grep -R -E 'patient-001|specimen-001|sample-001|Synthetic|Exampletown|ZZ1 1ZZ' \
            build/ci/runs/*/gold build/ci/runs/*/silver; then
            echo "Direct identifier found in a research-ready zone"
            exit 1
          fi
      - name: Build operations and AWS publication evidence
        run: |
          clinical-genomic-operations \
            --output build/ci \
            --json build/ci/operations-summary.json \
            --html build/ci/operations-dashboard.html
          python - <<'PY'
          import json
          from pathlib import Path
          from clinical_genomic_pipeline.storage import build_curated_publish_plan

          summary = json.loads(Path("build/ci/operations-summary.json").read_text())
          run_directory = next(Path("build/ci/runs").iterdir())
          contract = json.loads((run_directory / "contract_report.json").read_text())
          quality = json.loads((run_directory / "data_quality_report.json").read_text())
          transfer = json.loads((run_directory / "transfer_report.json").read_text())
          plan = build_curated_publish_plan(
              run_directory=run_directory,
              bucket="synthetic-curated-bucket",
              prefix="clinical-genomic",
          )
          Path("build/ci/curated-publish-plan.json").write_text(
              json.dumps(plan, indent=2, sort_keys=True) + "\n"
          )
          assert summary["status"] == "HEALTHY"
          assert summary["successful_count"] == 1
          assert summary["quarantined_count"] == 0
          assert summary["warning_count"] == 0
          assert contract["status"] == "PASS"
          assert len(contract["schema_fingerprint"]) == 64
          assert quality["status"] == "PASS"
          assert quality["terminology"]["mapping_coverage"] == 1.0
          assert transfer["status"] == "PASS"
          assert transfer["tool"] == "GLOBUS"
          assert any("gold/omop/person.csv" in item["source_path"] for item in plan)
          assert not any("restricted" in item["source_path"] for item in plan)
          PY
      - name: Upload run evidence
        uses: actions/upload-artifact@v4
        with:
          name: clinical-genomic-run-evidence
          path: |
            clinical_genomic_pipeline/build-transfer.json
            clinical_genomic_pipeline/build-first.json
            clinical_genomic_pipeline/build-second.json
            clinical_genomic_pipeline/build/transfer-receipt.json
            clinical_genomic_pipeline/build/ci/operations-summary.json
            clinical_genomic_pipeline/build/ci/operations-dashboard.html
            clinical_genomic_pipeline/build/ci/curated-publish-plan.json
            clinical_genomic_pipeline/build/ci/runs/*/contract_report.json
            clinical_genomic_pipeline/build/ci/runs/*/transfer_report.json
            clinical_genomic_pipeline/build/ci/runs/*/data_quality_report.json
            clinical_genomic_pipeline/build/ci/runs/*/lineage.json
            clinical_genomic_pipeline/build/ci/runs/*/metrics.json
            clinical_genomic_pipeline/build/ci/runs/*/gold/research_cohort.csv
            clinical_genomic_pipeline/build/ci/runs/*/gold/omop/*.csv

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/aws/clinical_genomic
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
