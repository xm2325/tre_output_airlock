name: Bug report
description: Report a reproducible problem using synthetic data only.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include real participant, patient or confidential data.
  - type: textarea
    id: behaviour
    attributes:
      label: Observed behaviour
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal synthetic reproduction
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
