name: Pages demo

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Build browser-only synthetic demo
        run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: "true"
          VITE_BASE_PATH: /tre_output_airlock/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  screenshots:
    name: Capture live screenshots
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright Chromium
        run: |
          mkdir -p "$RUNNER_TEMP/airlock-capture"
          cd "$RUNNER_TEMP/airlock-capture"
          npm init -y
          npm install playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Capture deployed workflow
        env:
          SITE_URL: ${{ needs.deploy.outputs.page_url }}
          NODE_PATH: ${{ runner.temp }}/airlock-capture/node_modules
        run: |
          mkdir -p docs/screenshots
          node <<'NODE'
          const { chromium } = require('playwright')
          const fs = require('fs')

          const siteUrl = process.env.SITE_URL || 'https://xm2325.github.io/tre_output_airlock/'

          async function openWithRetry(page) {
            let lastError
            for (let attempt = 1; attempt <= 12; attempt += 1) {
              try {
                const separator = siteUrl.includes('?') ? '&' : '?'
                const response = await page.goto(
                  `${siteUrl}${separator}capture=${Date.now()}`,
                  { waitUntil: 'networkidle', timeout: 30_000 },
                )
                if (response && response.ok()) return
                lastError = new Error(`HTTP ${response ? response.status() : 'no response'}`)
              } catch (error) {
                lastError = error
              }
              await page.waitForTimeout(10_000)
            }
            throw lastError
          }

          ;(async () => {
            const browser = await chromium.launch({ headless: true })
            const context = await browser.newContext({
              viewport: { width: 1600, height: 1100 },
              deviceScaleFactor: 1,
            })
            const page = await context.newPage()
            await page.emulateMedia({ reducedMotion: 'reduce' })
            await openWithRetry(page)
            await page.getByText('Static portfolio demo', { exact: true }).waitFor({ timeout: 30_000 })
            await page.addStyleTag({
              content: '* { animation: none !important; transition: none !important; }',
            })
            await page.screenshot({
              path: 'docs/screenshots/01-operations-dashboard.png',
              fullPage: false,
            })

            await page.getByLabel('Role').selectOption('reviewer')
            await page.locator('.queue-row').first().waitFor({ timeout: 20_000 })
            const reviewGrid = page.locator('.dashboard-grid--secondary').first()
            await reviewGrid.scrollIntoViewIfNeeded()
            await reviewGrid.screenshot({
              path: 'docs/screenshots/02-review-queue.png',
            })

            await page.locator('.queue-row').first().click()
            const drawer = page.getByRole('dialog')
            await drawer.waitFor({ timeout: 20_000 })
            const claimButton = page.getByRole('button', { name: /Claim review/ })
            if (await claimButton.isVisible()) {
              await claimButton.click()
              await page.getByText(/Claimed by/).waitFor({ timeout: 10_000 })
            }
            const templateButton = page.getByRole('button', { name: 'Use mitigation example' })
            if (await templateButton.isEnabled()) await templateButton.click()
            await drawer.evaluate((element) => { element.scrollTop = 0 })
            await page.screenshot({
              path: 'docs/screenshots/03-review-detail.png',
              fullPage: false,
            })

            await browser.close()
            for (const name of fs.readdirSync('docs/screenshots')) {
              console.log(`captured docs/screenshots/${name}`)
            }
          })().catch((error) => {
            console.error(error)
            process.exit(1)
          })
          NODE

      - name: Add screenshots to README
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")
          heading = "## Product screenshots"
          if heading not in text:
              block = """## Product screenshots

### Researcher operations dashboard

![TRE Output Airlock operations dashboard](docs/screenshots/01-operations-dashboard.png)

### Risk-prioritised reviewer queue

![TRE Output Airlock reviewer queue](docs/screenshots/02-review-queue.png)

### Claimed review with evidence and decision controls

![TRE Output Airlock submission review detail](docs/screenshots/03-review-detail.png)

"""
              anchor = "## Main capabilities"
              if anchor not in text:
                  raise SystemExit(f"README anchor not found: {anchor}")
              path.write_text(text.replace(anchor, block + anchor, 1), encoding="utf-8")
          PY

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-screenshots
          path: docs/screenshots/*.png

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/screenshots/*.png
          if git diff --cached --quiet; then
            echo "Screenshots are unchanged."
            exit 0
          fi
          git commit -m "Add live GitHub Pages screenshots"
          git push
