name: Fix API imports

on:
  push:
    branches: [agent/delivery-v031-clean]
    paths:
      - ".github/workflows/fix-api-imports.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/delivery-v031-clean
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen --all-extras
        working-directory: backend
      - name: Apply Ruff safe import fixes
        working-directory: backend
        run: |
          uv run ruff check \
            app/api/common.py \
            app/api/operations_routes.py \
            app/api/review_routes.py \
            app/api/submission_routes.py \
            --select I --fix
          uv run ruff check app tests alembic
      - name: Commit API import fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/app/api/common.py \
            backend/app/api/operations_routes.py \
            backend/app/api/review_routes.py \
            backend/app/api/submission_routes.py
          git commit -m "Organize API imports"
          git push origin HEAD:agent/delivery-v031-clean
