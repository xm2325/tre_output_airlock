name: Export branch git metadata

on:
  pull_request:
    paths:
      - ".github/workflows/export-source.yml"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Read branch commit and tree
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p git-metadata
          ref_json=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/agent/v040-synthetic-evaluation")
          commit_sha=$(printf '%s' "$ref_json" | jq -r '.object.sha')
          gh api "repos/${GITHUB_REPOSITORY}/git/commits/${commit_sha}" > git-metadata/commit.json
          printf '%s\n' "$commit_sha" > git-metadata/commit-sha.txt
          jq -r '.tree.sha' git-metadata/commit.json > git-metadata/tree-sha.txt
      - uses: actions/upload-artifact@v4
        with:
          name: branch-git-metadata
          path: git-metadata
