name: Diagnose Pages deployment

on:
  pull_request:
    paths:
      - ".github/workflows/capture-pages.yml"

permissions:
  actions: read
  contents: read
  pages: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Query Pages configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p pages-diagnostics
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/pages" \
            > pages-diagnostics/pages-config.json \
            2> pages-diagnostics/pages-config.stderr
          echo "$?" > pages-diagnostics/pages-config.exit-code

          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/pages.yml/runs?per_page=20" \
            > pages-diagnostics/pages-runs.json \
            2> pages-diagnostics/pages-runs.stderr
          echo "$?" > pages-diagnostics/pages-runs.exit-code

          curl --location --silent --show-error --head \
            --write-out "status=%{http_code} effective_url=%{url_effective}\n" \
            --output /dev/null \
            https://xm2325.github.io/tre_output_airlock/ \
            > pages-diagnostics/http-status.txt \
            2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: pages-deployment-diagnostics
          path: pages-diagnostics/
